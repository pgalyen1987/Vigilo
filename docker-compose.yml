services:
  vigilo:
    build: .
    ports:
      - "${VIGILO_PORT:-8088}:8088"
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./reports:/app/reports
    env_file:
      - .env
    environment:
      - VIGILO_HOST=0.0.0.0
      - VIGILO_PORT=8088
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # One-shot: train the model, then exit.
  # Usage: docker compose run --rm train --logs data/home/home.conn.log
  train:
    build: .
    command: ["train"]
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
    env_file:
      - .env
    profiles:
      - tools
