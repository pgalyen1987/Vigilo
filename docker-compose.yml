services:
  vigilo:
    build: .
    ports:
      - "${VIGILO_PORT:-8088}:8088"
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./reports:/app/reports
    env_file:
      - .env
    environment:
      - VIGILO_HOST=0.0.0.0
      - VIGILO_PORT=8088
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Passive SPAN / gateway capture — Zeek writes conn.log, Vigilo analyzes it.
  # Usage: cp .env.span.example .env && docker compose --profile span up -d
  # See docs/DEPLOY-SPAN-GATEWAY.md
  zeek:
    image: zeek/zeek:latest
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./data/zeek:/logs
    working_dir: /logs
    command: ["-i", "${CAPTURE_IFACE:-eth1}"]
    restart: unless-stopped
    profiles:
      - span

  # One-shot: train the model, then exit.
  # Usage: docker compose run --rm train --logs data/home/home.conn.log
  train:
    build: .
    command: ["train"]
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
    env_file:
      - .env
    profiles:
      - tools
